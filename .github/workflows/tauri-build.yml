name: Tauri Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tauri-build-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            id: linux
            os: ubuntu-22.04
            artifact_name: tauri-linux
            artifact_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - name: Windows
            id: windows
            os: windows-latest
            artifact_name: tauri-windows
            artifact_paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            id: macos
            os: macos-latest
            artifact_name: tauri-macos
            artifact_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install

      - name: Build UI
        run: pnpm ui:build

      - name: Build Tauri app
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.platform.id }}" == "macos" ]]; then
            pnpm tauri build --target universal-apple-darwin || pnpm tauri build
          else
            pnpm tauri build
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_paths }}
          if-no-files-found: error

  release:
    name: Publish Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Normalize release asset names
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob globstar

          mkdir -p release-files

          deb=(release-artifacts/**/*.deb)
          appimage=(release-artifacts/**/*.AppImage)
          msi=(release-artifacts/**/*.msi)
          exe=(release-artifacts/**/*.exe)
          dmg=(release-artifacts/**/*.dmg)

          if (( ${#deb[@]} == 0 || ${#appimage[@]} == 0 || ${#msi[@]} == 0 || ${#exe[@]} == 0 || ${#dmg[@]} == 0 )); then
            echo "Missing one or more expected installer assets." >&2
            find release-artifacts -maxdepth 4 -type f | sort >&2 || true
            exit 1
          fi

          cp "${deb[0]}" release-files/Kova_1.0.0_amd64.deb
          cp "${appimage[0]}" release-files/Kova_1.0.0_amd64.AppImage
          cp "${msi[0]}" release-files/$(basename "${msi[0]}")
          cp "${exe[0]}" release-files/Kova_1.0.0_x64-setup.exe
          cp "${dmg[0]}" release-files/Kova_1.0.0_universal.dmg

          echo "Release assets:"
          ls -la release-files

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Kova v${{ github.run_number }}
          generate_release_notes: true
          files: release-files/*
          overwrite_files: true
